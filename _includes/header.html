<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a>
    
    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger" class="menu-icon">&#9776;</label>
      <div class="trigger">
        {% assign sorted_navigation = site.data.navigation | sort: 'order' %}
        {% for item in sorted_navigation %}
          <a class="page-link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
      </div>
    </nav>
  </div>
</header>

<style>
  .site-title {
    color: grey;
  }
  .site-nav .menu-icon {
    display: none;
    cursor: pointer;
    font-size: 24px;
    color: grey;
    border: none;
  }
  .site-nav .nav-trigger {
    display: none;
  }
  @media screen and (max-width: 600px) {
    .site-nav .menu-icon {
      display: block;
      margin-left: -10px;
      border: none;
    }
    .site-nav .trigger {
      display: none;
    }
    .site-nav .nav-trigger:checked ~ .trigger {
      display: block;
    }
  }
</style>
