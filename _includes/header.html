<header class="site-header">
  <div class="wrapper" style="text-align: center;">
    <a class="site-title" href="{{ site.baseurl }}/" style="display: inline-block;">{{ site.title }}</a>
  </div>
  <div class="wrapper">
    <nav class="site-nav">
      <div class="trigger">
        {% assign sorted_navigation = site.data.navigation | sort: 'order' %}
        {% for item in sorted_navigation %}
          <a class="page-link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
      </div>
    </nav>
  </div>
</header>

<style>
  .wrapper {
    text-align: center;
  }
  .site-title {
    color: grey;
    display: block;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    width: 100%;
    text-align: center;
  }
  .site-nav {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 35px;
  }
  .site-nav .trigger {
    width: 100%;
    display: flex;
    justify-content: center;
  }
  @media screen and (max-width: 600px) {
    .site-nav {
      flex-direction: column;
      align-items: center;
    }
  }
</style>
