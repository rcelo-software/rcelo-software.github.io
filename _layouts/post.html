---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
      {% if page.author %}
        • <span class="post-author">{{ page.author }}</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  .post {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  .post-header {
    margin-bottom: 30px;
  }

  .post-title {
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  .post-meta {
    color: #666;
    font-size: 0.9em;
  }

  .post-content {
    line-height: 1.6;
    font-size: 1.1em;
  }

  .post-content p {
    margin-bottom: 1.5em;
  }

  .post-content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 2em auto;
  }

  .post-content code {
    background-color: #f5f5f5;
    padding: 2px 5px;
    border-radius: 3px;
  }

  .post-content pre {
    background-color: #f5f5f5;
    padding: 15px;
    border-radius: 5px;
    overflow-x: auto;
  }
</style>
