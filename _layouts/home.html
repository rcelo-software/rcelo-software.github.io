layout: default

<style>
  .hologram {
    font-family: 'Courier New', Courier, monospace; /* Use a monospaced font for a techy look */
    font-size: 18px; /* Set a smaller base font size */
    color: #00FF00; /* Initial bright green color for hologram text */
    text-shadow: 0 0 1px #00FF00, 0 0 5px #00FF00, 0 0 5px #00FF00, 0 0 5px #00FF00; /* Create a glowing effect */
    animation: text-flicker 30s infinite alternate; /* Add a flickering animation to text shadow */
  }

  @keyframes text-flicker {
    0%, 100% { 
      text-shadow: 0 0 0.7px #FF00FF, 0 0 2.1px #FF00FF, 0 0 3.5px #FF00FF, 0 0 7px #FF00FF; 
      color: #FF00FF;
    }
    10%, 90% { 
      text-shadow: 0 0 0.7px #8A2BE2, 0 0 2.1px #8A2BE2, 0 0 3.5px #8A2BE2, 0 0 7px #8A2BE2; 
      color: #8A2BE2;
    }
    45%, 55% { 
      text-shadow: 0 0 0.7px #00CED1, 0 0 2.1px #00CED1, 0 0 3.5px #00CED1, 0 0 7px #00CED1; 
      color: #00CED1;
    }
    50% { 
      text-shadow: 0 0 0.7px #FFD700, 0 0 1.4px #FFD700, 0 0 2.1px #FFD700, 0 0 2.8px #FFD700; 
      color: #FFD700;
    }
  }

  .busy {
    font-weight: bold;
    font-family: 'Arial', sans-serif;
    font-size: 36px; /* Set the base font size */
    transition: text-shadow 0.5s ease, font-size 0.3s ease;
    color: rgb(62.9, 62.9, 62.9);/* Set text color to main website title color */
    max-width: 200px; /* Set a maximum width for text elements */
    white-space: normal; /* Allow text to wrap normally */
    margin: 10px; /* Add some margin for spacing */
    text-align: center; /* Center the text */
  }

  /* Updated hover effect for text to increase size */
  .busy:hover {
    font-size: 40px; /* Increase size on hover */
    opacity: 1;
  }

  .home-container {
    display: grid; /* Use grid layout */
    grid-template-columns: repeat(2, 1fr);
    gap: 0px; /* Set the gap between columns to 0px */
    justify-items: center; /* Center items horizontally */
    align-items: center; /* Center items vertically */
    padding: 0 20px; /* Padding for the container */
    text-align: center; /* Center text within each grid item */
  }

  .magic-button {
    padding: 0 20px; /* Padding for the container */
    font-family: 'Arial Black', Arial, sans-serif; /* Match navigation font */
    font-size: 30px; /* Increase font size */
    font-weight: bold; /* Match navigation font weight */
    color: #9146FF;
    transition: color 0.3s ease, font-size 0.3s ease; /* Add color transition */
    text-decoration: none; /* Ensure no underline */
    border: 1px solid #e8e8e8; /* Apple style border */
    border-radius: 5px; /* Slightly rounded corners */
    display: block; /* Make button a block element */
    margin: 0 auto; /* Center the button */
    animation: button-flicker 30s infinite alternate; /* Add flickering animation to button text */
  }

  @keyframes button-flicker {
    0%, 100% { 
      color: #FF00FF;
    }
    10%, 90% { 
      color: #8A2BE2;
    }
    45%, 55% { 
      color: #00CED1;
    }
    50% { 
      color: #FFD700;
    }
  }

  .magic-button:hover {
    color: var(--primary-hover); /* Change color on hover */
    font-size: 40px; /* Slightly increase font size on hover */  }

  .button-container {
    display: flex; /* Use flexbox to align buttons side by side */
    justify-content: center; /* Center the buttons horizontally */
    gap: 100px; /* Reduce space between the buttons */
  }
  
</style>
